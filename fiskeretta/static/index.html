<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fiskeretta Diagnostics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Martian+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:oklch(0.165 0.012 195); --surface:oklch(0.205 0.013 195); --surface-2:oklch(0.245 0.013 195);
    --line:oklch(0.30 0.012 195); --line-soft:oklch(0.26 0.012 195);
    --text:oklch(0.94 0.008 195); --dim:oklch(0.70 0.014 195); --faint:oklch(0.56 0.014 195);
    --accent:oklch(0.74 0.12 168); --accent-soft:oklch(0.30 0.05 168);
    --red:oklch(0.66 0.15 28); --red-soft:oklch(0.30 0.07 28);
    --amber:oklch(0.76 0.10 78); --amber-soft:oklch(0.30 0.05 78);
    --space-sm:8px; --space-md:12px; --space-lg:16px; --space-xl:24px; --space-2xl:32px;
    --r:12px; --r-sm:8px;
  }
  *{box-sizing:border-box;margin:0}
  html{-webkit-font-smoothing:antialiased}
  body{background:var(--bg);color:var(--text);font-family:"Hanken Grotesk",sans-serif;font-size:15px;line-height:1.5;
    -webkit-user-select:text;user-select:text}
  .status,.btn,.linkbtn,.tier .name,.caret{-webkit-user-select:none;user-select:none}
  .copybtn{font-family:inherit;background:var(--surface-2);border:1px solid var(--line);color:var(--dim);
    font-size:11px;font-weight:600;border-radius:6px;padding:3px 9px;cursor:pointer;-webkit-user-select:none;user-select:none}
  .copybtn:hover{color:var(--text)}
  .loghead .sp{flex:1}
  .tnum{font-variant-numeric:tabular-nums}
  .mono{font-family:"Martian Mono",monospace;font-variant-ligatures:none}
  .wrap{max-width:780px;margin:0 auto;padding:20px 18px 64px}

  .status{display:flex;align-items:center;gap:10px;padding:var(--space-md) var(--space-lg);
    background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r)}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--faint);flex:none}
  .pulse.on{background:var(--accent);box-shadow:0 0 0 0 var(--accent);animation:pulse 2.6s ease-out infinite}
  .pulse.busy{background:var(--amber)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 oklch(0.74 0.12 168/.5)}70%{box-shadow:0 0 0 7px oklch(0.74 0.12 168/0)}100%{box-shadow:0 0 0 0 oklch(0.74 0.12 168/0)}}
  .status .dev{font-weight:600;letter-spacing:-0.01em}
  .status .st{color:var(--dim);font-size:13px}
  .status .sp{flex:1}
  .linkbtn{font-family:inherit;background:none;border:none;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;padding:0}

  .vehicle{padding:var(--space-xl) 2px var(--space-lg)}
  .vehicle .vin{font-size:25px;letter-spacing:0.06em;font-weight:500}
  .vehicle .model{color:var(--dim);margin-top:6px;font-size:14px;font-weight:500}
  .summary{display:flex;align-items:baseline;gap:var(--space-md);flex-wrap:wrap;margin-top:var(--space-lg)}
  .summary .big{font-size:34px;font-weight:800;letter-spacing:-0.02em;line-height:1}
  .summary .big.has{color:var(--red)}
  .summary .lead{font-size:14px;color:var(--dim)}
  .summary .meta{margin-left:auto;text-align:right;color:var(--faint);font-size:12.5px;line-height:1.6}
  .summary .meta b{color:var(--text);font-weight:600}
  .placeholder{color:var(--faint);font-size:14px;padding:var(--space-md) 2px}

  .tier{display:flex;align-items:center;gap:var(--space-md);margin:var(--space-2xl) 2px var(--space-md)}
  .tier .name{font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--faint)}
  .tier .rule{flex:1;height:1px;background:var(--line-soft)}
  .tier .count{font-size:11px;color:var(--faint);font-weight:600}

  .mod{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);margin-bottom:var(--space-sm);overflow:hidden;transition:border-color .18s ease}
  .mod:hover{border-color:var(--line)}
  .mod.flagged{background:linear-gradient(180deg,oklch(0.215 0.02 28),var(--surface) 64px)}
  .mhead{display:flex;align-items:center;gap:var(--space-md);padding:var(--space-md) var(--space-lg);cursor:pointer;user-select:none}
  .mod.empty .mhead{cursor:default}
  .dot{width:7px;height:7px;border-radius:50%;flex:none;background:var(--faint)}
  .dot.red{background:var(--red)} .dot.amber{background:var(--amber)} .dot.green{background:var(--accent)}
  .mid{display:flex;flex-direction:column;gap:1px;min-width:0}
  .mname{font-weight:700;letter-spacing:0.02em;font-size:14.5px}
  .mfull{color:var(--dim);font-size:12.5px;font-weight:500}
  .msp{flex:1}
  .pill{font-size:11.5px;font-weight:700;border-radius:99px;padding:3px 10px;white-space:nowrap}
  .pill.red{background:var(--red-soft);color:oklch(0.85 0.09 28)}
  .pill.amber{background:var(--amber-soft);color:oklch(0.86 0.08 78)}
  .pill.green{background:var(--accent-soft);color:oklch(0.86 0.09 168)}
  .pill.gray{background:var(--surface-2);color:var(--faint)}
  .caret{color:var(--faint);transition:transform .22s cubic-bezier(.22,1,.36,1);font-size:11px}
  .mod.open .caret.mcaret{transform:rotate(90deg)}
  .mbody{display:grid;grid-template-rows:0fr;transition:grid-template-rows .26s cubic-bezier(.22,1,.36,1)}
  .mod.open .mbody{grid-template-rows:1fr}
  .mbody>.inner{overflow:hidden;border-top:1px solid var(--line-soft)}

  .code{display:flex;align-items:flex-start;gap:var(--space-md);padding:var(--space-md) var(--space-lg);border-bottom:1px solid var(--line-soft);cursor:pointer}
  .code:last-child{border-bottom:none}
  .cdot{width:6px;height:6px;border-radius:50%;margin-top:7px;flex:none}
  .cdot.red{background:var(--red)} .cdot.amber{background:var(--amber)}
  .cmid{flex:1;min-width:0}
  .cline{display:flex;align-items:center;gap:var(--space-sm)}
  .ccode{font-size:12.5px;font-weight:600;letter-spacing:0.02em}
  .cflag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em}
  .cflag.red{color:var(--red)} .cflag.amber{color:var(--amber)}
  .cdesc{color:var(--dim);font-size:13.5px;margin-top:3px;line-height:1.45}
  .code.open .ccaret{transform:rotate(90deg)}
  .drill{display:grid;grid-template-rows:0fr;transition:grid-template-rows .26s cubic-bezier(.22,1,.36,1)}
  .code.open .drill{grid-template-rows:1fr}
  .drill>.di{overflow:hidden}
  .dpanel{margin-top:var(--space-md);padding:var(--space-lg);background:var(--bg);border:1px solid var(--line-soft);border-radius:var(--r-sm)}
  .facts{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--space-md) var(--space-xl)}
  .fact .k{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--faint);font-weight:700}
  .fact .v{margin-top:2px;font-size:13.5px}
  .dsec{margin-top:var(--space-lg)}
  .dsec h4{font-size:10.5px;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);font-weight:700;margin-bottom:6px}
  .dsec p{color:oklch(0.86 0.01 195);font-size:14px;white-space:pre-line}
  .src{margin-top:var(--space-lg);padding-top:var(--space-md);border-top:1px solid var(--line-soft);font-size:11.5px;color:var(--faint)}
  .mod.slim .mhead{padding-top:var(--space-sm);padding-bottom:var(--space-sm)}
  .mod.muted{opacity:.62}

  .unreached{background:var(--surface);border:1px dashed var(--line);border-radius:var(--r);padding:var(--space-lg)}
  .ureached-top{display:flex;align-items:center;gap:var(--space-md);margin-bottom:var(--space-lg);flex-wrap:wrap}
  .ureached-top .txt{flex:1;font-size:13px;color:var(--dim);min-width:240px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:var(--space-sm)}
  .uchip{padding:var(--space-sm) var(--space-md);background:var(--bg);border:1px solid var(--line-soft);border-radius:var(--r-sm);opacity:.8}
  .uchip .ua{font-weight:700;font-size:12.5px} .uchip .un{color:var(--faint);font-size:11.5px;margin-top:1px}

  .scan{display:flex;align-items:center;gap:var(--space-md);padding:var(--space-md) var(--space-lg);background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r-sm);margin-bottom:6px}
  .scan .when{font-weight:600;font-size:13.5px;min-width:170px}
  .scan .ssum{color:var(--dim);font-size:13px;flex:1}

  .btn{font-family:inherit;font-size:13.5px;font-weight:600;border-radius:var(--r-sm);padding:9px 15px;border:1px solid transparent;cursor:pointer;letter-spacing:-0.01em;transition:.15s ease}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.primary{background:var(--accent);color:oklch(0.20 0.04 168)}
  .btn.primary:hover:not(:disabled){background:oklch(0.79 0.12 168)}
  .btn.ghost{background:transparent;color:var(--text);border-color:var(--line)}
  .actions{display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-top:var(--space-md)}

  .logbox{background:oklch(0.14 0.01 195);border:1px solid var(--line-soft);border-radius:var(--r-sm);overflow:hidden;margin-top:var(--space-xl)}
  .loghead{display:flex;align-items:center;gap:var(--space-sm);padding:10px var(--space-lg);cursor:pointer;color:var(--faint);font-size:12px}
  .logbody{display:none;max-height:240px;overflow-y:auto;padding:0 var(--space-lg) var(--space-md);color:var(--faint);font-family:"Martian Mono",monospace;font-size:11px;line-height:1.5;white-space:pre-wrap}
  .logbox.open .logbody{display:block}
  .logbox.open .loghead .caret{transform:rotate(90deg)}
</style>
</head>
<body>
<div class="wrap">

  <div class="status">
    <span class="pulse" id="dot"></span>
    <span class="dev" id="dev">Fiskeretta Diagnostics</span>
    <span class="st" id="connText">starting…</span>
    <span class="sp"></span>
    <button class="linkbtn" id="reconnect" style="display:none">Reconnect</button>
  </div>

  <div class="vehicle" id="vehicle">
    <div class="placeholder" id="vehiclePlaceholder">Connecting to the dongle…</div>
  </div>

  <div id="diagnostics"></div>

  <div id="discoveryResult"></div>

  <div id="savedWrap" style="display:none">
    <div class="tier"><span class="name">Saved scans</span><span class="rule"></span><span class="count">kept on disk</span></div>
    <div id="saved"></div>
  </div>

  <div class="actions">
    <button class="btn primary" id="rescan" disabled>Re-scan</button>
    <button class="btn ghost" id="export" disabled>Export</button>
  </div>

  <div class="logbox" id="logbox">
    <div class="loghead" id="loghead"><span class="caret">▸</span> Activity log<span class="sp"></span><button class="copybtn" id="logcopy">Copy</button></div>
    <div class="logbody" id="logbody"></div>
  </div>

</div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => (s==null?"":String(s)).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
let connected = false, busy = false, started = false, lastResult = null, lastDiscovery = [];
function copyText(text){
  if (navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(text);
  const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); } catch (e) {}
  ta.remove(); return Promise.resolve();
}
function flashCopied(btn){ const t = btn.textContent; btn.textContent = "Copied"; setTimeout(() => btn.textContent = t, 1200); }
function copyDiscovery(e){
  const text = lastDiscovery.map(d => {
    const id = "0x" + d.request_id.toString(16).toUpperCase();
    const resp = "0x" + d.response_id.toString(16).toUpperCase();
    const who = d.module ? d.module.toUpperCase() : (d.name_hint || "unidentified");
    return `${id}\t${resp}\t${who}${d.module ? "" : " (new)"}`;
  }).join("\n");
  copyText(text); if (e && e.target) flashCopied(e.target);
}

const ws = new WebSocket(`ws://${location.host}/ws`);
const send = (command) => ws.send(JSON.stringify({command}));
const sendMsg = (obj) => ws.send(JSON.stringify(obj));

ws.onopen = () => log("Connected to Fiskeretta Diagnostics.");
ws.onclose = () => { connected = false; setStatus({connected:false, device:null}); $("connText").textContent = "server connection lost"; };
ws.onmessage = (e) => {
  const m = JSON.parse(e.data);
  if (m.type === "log") log(m.message);
  else if (m.type === "status") { busy = m.value === "running"; renderControls(); paintDot(); if (busy) showScanning(); }
  else if (m.type === "connection") onConnection(m);
  else if (m.type === "scan_result") renderScan(m.result);
  else if (m.type === "saved_scans") renderSaved(m.scans);
  else if (m.type === "code_detail") onCodeDetail(m);
  else if (m.type === "discovery") onDiscovery(m);
};

function startDiscover(){
  if (!connected || busy) return;
  $("logbox").classList.add("open");
  send("discover");
}
function onDiscovery(m){
  lastDiscovery = m.ecus || [];
  const ecus = lastDiscovery;
  const news = ecus.filter(e => !e.module).length;
  let html = `<div class="tier"><span class="name">Discovered ECUs</span><span class="rule"></span><span class="count tnum">${ecus.length} responding · ${news} new</span><button class="copybtn" onclick="copyDiscovery(event)">Copy</button></div>`;
  html += `<div class="unreached"><div class="grid">`;
  for (const e of ecus){
    const id = "0x" + e.request_id.toString(16).toUpperCase();
    const who = e.module ? e.module.toUpperCase() : (e.name_hint || "unidentified");
    html += `<div class="uchip"><div class="ua mono">${id}</div><div class="un">${esc(who)}${e.module?"":" · new"}</div></div>`;
  }
  html += `</div></div>`;
  $("discoveryResult").innerHTML = html;
}

function onConnection(m){
  connected = m.connected;
  setStatus(m);
  if (connected && !started){ started = true; send("saved_scans"); send("scan"); }
  renderControls();
}
function setStatus(m){
  $("connText").textContent = m.connected ? "connected" : "not connected";
  $("dev").textContent = m.device || "Fiskeretta Diagnostics";
  $("reconnect").style.display = m.connected ? "none" : "inline";
  paintDot();
}
function paintDot(){ $("dot").className = "pulse" + (busy ? " busy" : (connected ? " on" : "")); }
function renderControls(){ $("rescan").disabled = !connected || busy; $("export").disabled = !lastResult; }

function showScanning(){ if (!lastResult) $("vehiclePlaceholder").textContent = "Scanning the car…"; }

const TIERS = {active:"Needs attention", historical:"Historical", clear:"Healthy", unreachable:"Asleep · unreachable"};
const DOT = {active:"red", historical:"amber", clear:"green", unreachable:""};

function renderScan(r){
  lastResult = r; busy = false; renderControls(); paintDot();
  renderVehicle(r.vehicle || {}, r.summary || {});
  renderDiagnostics(r.modules || []);
}

function renderVehicle(v, s){
  const modelBits = [v.year, v.make, v.model, v.series].filter(Boolean).join(" ");
  const drive = v.ev_drive ? ` · ${v.ev_drive}` : (v.drive_type ? ` · ${v.drive_type}` : "");
  const active = s.active || 0;
  $("vehicle").innerHTML = `
    <div class="vin mono">${esc(v.vin || "—")}</div>
    <div class="model">${esc(modelBits || "Vehicle")}${esc(drive)}</div>
    <div class="summary">
      <span class="big ${active?"has":""} tnum">${active}</span>
      <span class="lead">${active === 1 ? "active fault needs attention" : "active faults need attention"}</span>
      <span class="meta"><b class="tnum">${s.historical||0}</b> historical<br><b class="tnum">${s.modules_reachable||0}</b> of <b class="tnum">${s.modules_total||0}</b> modules reachable</span>
    </div>`;
}

function renderDiagnostics(mods){
  const reached = mods.filter(m => m.status !== "not_reached");
  const notReached = mods.filter(m => m.status === "not_reached");
  let html = "", lastTier = null;
  for (const m of reached){
    if (m.status !== lastTier){
      lastTier = m.status;
      const n = reached.filter(x => x.status === m.status).length;
      html += `<div class="tier"><span class="name">${esc(TIERS[m.status]||m.status)}</span><span class="rule"></span><span class="count tnum">${n} module${n>1?"s":""}</span></div>`;
    }
    html += moduleCard(m);
  }
  if (notReached.length){
    html += `<div class="tier"><span class="name">Not yet reached</span><span class="rule"></span><span class="count tnum">${notReached.length} modules</span></div>`;
    html += `<div class="unreached"><div class="ureached-top"><span class="txt">These exist in the car but we don't have their addresses yet. Discovery probes the bus to find responding ECUs.</span><button class="btn primary" onclick="startDiscover()">Discover modules</button></div><div class="grid">`;
    for (const m of notReached) html += `<div class="uchip"><div class="ua">${esc(m.name.toUpperCase())}</div><div class="un">${esc(m.label)}</div></div>`;
    html += `</div></div>`;
  }
  $("diagnostics").innerHTML = html;
}

function moduleCard(m){
  const flagged = m.status === "active" ? " flagged" : "";
  const empty = m.codes.length === 0 ? " empty" : "";
  const slim = (m.status === "clear" || m.status === "unreachable") ? " slim" : "";
  const muted = m.status === "unreachable" ? " muted" : "";
  let badges = "";
  if (m.counts.active) badges += `<span class="pill red tnum">${m.counts.active} active</span>`;
  if (m.counts.historical) badges += `<span class="pill amber tnum">${m.counts.historical} historical</span>`;
  if (m.status === "clear") badges += `<span class="pill green">clear</span>`;
  if (m.status === "unreachable") badges += `<span class="pill gray">no response</span>`;
  const caret = m.codes.length ? `<span class="caret mcaret">▸</span>` : "";
  const codes = m.codes.map(c => codeRow(c, m.name)).join("");
  const clickable = m.codes.length ? ' onclick="this.parentElement.classList.toggle(\'open\')"' : "";
  return `<div class="mod${flagged}${empty}${slim}${muted}">
    <div class="mhead"${clickable}>
      <span class="dot ${DOT[m.status]||""}"></span>
      <span class="mid"><span class="mname">${esc(m.name.toUpperCase())}</span><span class="mfull">${esc(m.label)}</span></span>
      <span class="msp"></span>${badges}${caret}
    </div>
    <div class="mbody"><div class="inner">${codes}</div></div>
  </div>`;
}

function statusDecode(b){
  const parts = [];
  if (b & 0x01) parts.push("failing now");
  if (b & 0x08) parts.push("confirmed");
  return `0x${b.toString(16).toUpperCase().padStart(2,"0")}${parts.length?" · "+parts.join(" + "):""}`;
}

function codeRow(c, mod){
  const failing = c.failing_now;
  const facts = [
    ["Status", statusDecode(c.status_byte)],
    ["SAE / page", `${esc(c.j2012||"—")}${c.page?" · p"+c.page:""}`],
  ];
  let drill = `<div class="dsec"><h4>When it happened</h4><p class="occ">—</p></div>`;
  drill += `<div class="facts">${facts.map(([k,v])=>`<div class="fact"><div class="k">${k}</div><div class="v mono">${v}</div></div>`).join("")}</div>`;
  const meaning = c.subsystem || c.description;
  if (meaning) drill += `<div class="dsec"><h4>What it means</h4><p>${esc(meaning)}</p></div>`;
  if (c.failure_event) drill += `<div class="dsec"><h4>Failure condition</h4><p>${esc(c.failure_event)}</p></div>`;
  if (c.steps) drill += `<div class="dsec"><h4>Diagnostic steps</h4><p>${esc(c.steps)}</p></div>`;
  drill += `<div class="src">From the Fisker DTC manual</div>`;
  return `<div class="code" data-module="${esc(mod)}" data-code="${esc(c.code)}" onclick="toggleCode(this)">
    <span class="cdot ${failing?"red":"amber"}"></span>
    <div class="cmid">
      <div class="cline"><span class="ccode mono">${esc(c.code)}</span><span class="cflag ${failing?"red":"amber"}">${failing?"Failing now":"Historical"}</span></div>
      <div class="cdesc">${esc(c.description || "(no description — code not in the manual)")}</div>
      <div class="drill"><div class="di"><div class="dpanel">${drill}</div></div></div>
    </div>
    <span class="caret ccaret">▸</span>
  </div>`;
}

function toggleCode(el){
  const opening = !el.classList.contains("open");
  el.classList.toggle("open");
  if (opening && !el.dataset.fetched){
    el.dataset.fetched = "1";
    const occ = el.querySelector(".occ");
    if (occ) occ.textContent = "Reading fault history…";
    sendMsg({command:"code_detail", module: el.dataset.module, code: el.dataset.code});
  }
}

function onCodeDetail(m){
  const el = document.querySelector(`.code[data-module="${m.module}"][data-code="${m.code}"]`);
  if (!el) return;
  const occ = el.querySelector(".occ");
  if (!occ) return;
  if (!m.available){ occ.textContent = "No freeze-frame stored for this code."; return; }
  const L = m.latest || {};
  const parts = [];
  if (L.odometer_mi != null) parts.push(L.odometer_mi.toLocaleString() + " mi");
  if (L.timestamp) parts.push(L.timestamp);
  else if (L.timestamp_unset) parts.push("clock not set");
  let txt = parts.join(" · ") || "recorded (no odometer/time)";
  const n = (m.records || []).length;
  if (n > 1) txt += ` — seen ${n}×`;
  occ.textContent = txt;
}

function renderSaved(scans){
  if (!scans || !scans.length){ $("savedWrap").style.display = "none"; return; }
  $("savedWrap").style.display = "block";
  $("saved").innerHTML = scans.map(s => {
    const when = s.scanned_at ? new Date(s.scanned_at).toLocaleString() : s.id;
    return `<div class="scan"><span class="when tnum">${esc(when)}</span><span class="ssum tnum">${s.active||0} active · ${s.historical||0} historical</span></div>`;
  }).join("");
}

function log(msg){
  const b = $("logbody"); const atBottom = b.scrollHeight - b.scrollTop - b.clientHeight < 6;
  b.textContent += msg + "\n"; if (atBottom) b.scrollTop = b.scrollHeight;
}
$("loghead").addEventListener("click", () => $("logbox").classList.toggle("open"));
$("logcopy").addEventListener("click", (e) => { e.stopPropagation(); copyText($("logbody").textContent); flashCopied($("logcopy")); });
$("rescan").addEventListener("click", () => { if (connected && !busy) send("scan"); });
$("reconnect").addEventListener("click", () => send("connect"));
$("export").addEventListener("click", () => {
  if (!lastResult) return;
  const blob = new Blob([JSON.stringify(lastResult, null, 2)], {type:"application/json"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = `fiskeretta-scan-${(lastResult.vehicle&&lastResult.vehicle.vin)||"scan"}.json`; a.click();
});
</script>
</body>
</html>
