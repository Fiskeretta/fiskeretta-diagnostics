<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fiskeretta Diagnostics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Martian+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:oklch(0.165 0.012 195); --surface:oklch(0.205 0.013 195); --surface-2:oklch(0.245 0.013 195);
    --line:oklch(0.30 0.012 195); --line-soft:oklch(0.26 0.012 195);
    --text:oklch(0.94 0.008 195); --dim:oklch(0.70 0.014 195); --faint:oklch(0.56 0.014 195);
    --accent:oklch(0.74 0.12 168); --accent-soft:oklch(0.30 0.05 168);
    --red:oklch(0.66 0.15 28); --red-soft:oklch(0.30 0.07 28);
    --amber:oklch(0.76 0.10 78); --amber-soft:oklch(0.30 0.05 78);
    --space-sm:8px; --space-md:12px; --space-lg:16px; --space-xl:24px; --space-2xl:32px;
    --r:12px; --r-sm:8px;
  }
  *{box-sizing:border-box;margin:0}
  html{-webkit-font-smoothing:antialiased}
  body{background:var(--bg);color:var(--text);font-family:"Hanken Grotesk",sans-serif;font-size:15px;line-height:1.5;height:100vh;overflow:hidden;-webkit-user-select:text;user-select:text}
  .mono{font-family:"Martian Mono",monospace;font-variant-ligatures:none}
  .tnum{font-variant-numeric:tabular-nums}
  button{font-family:inherit}

  .app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* ---- top bar ---- */
  .top{display:flex;align-items:center;gap:var(--space-xl);padding:0 var(--space-xl);height:62px;border-bottom:1px solid var(--line-soft);background:var(--surface);flex:none}
  .conn{display:flex;align-items:center;gap:var(--space-sm);min-width:170px}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--faint);flex:none}
  .pulse.on{background:var(--accent)} .pulse.busy{background:var(--amber)}
  .pulse.work{animation:dotpulse 1.1s ease-in-out infinite}
  @keyframes dotpulse{0%,100%{opacity:1}50%{opacity:.2}}
  .conn .dev{font-weight:600;font-size:13.5px;letter-spacing:-0.01em}
  .conn .st{font-size:11.5px;color:var(--faint)}
  .veh{display:flex;flex-direction:column;gap:1px;min-width:0}
  .veh .vin{font-size:13.5px;letter-spacing:0.05em}
  .veh .model{font-size:11.5px;color:var(--dim)}
  .topsp{flex:1}
  .scanind{display:none;align-items:center;gap:8px;color:var(--amber);font-size:12.5px;font-weight:600}
  .scanind.show{display:flex}
  .spin{width:13px;height:13px;border:2px solid var(--amber-soft);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .scandrop{position:relative}
  .scantrig{font-family:inherit;font-size:12.5px;background:var(--surface-2);color:var(--text);border:1px solid var(--line);border-radius:var(--r-sm);padding:6px 24px 6px 10px;cursor:pointer;max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative}
  .scantrig::after{content:"\25BE";position:absolute;right:8px;top:6px;color:var(--faint);font-size:10px}
  .scanmenu{position:absolute;right:0;top:calc(100% + 5px);min-width:264px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:5px;z-index:60;box-shadow:0 8px 24px oklch(0 0 0/.45);max-height:62vh;overflow-y:auto}
  .scanmenu[hidden]{display:none}
  .smi{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--text)}
  .smi:hover{background:var(--surface)}
  .smi .smtxt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .smi .smdel{color:var(--faint);font-size:12px;padding:2px 6px;border-radius:4px;flex:none}
  .smi .smdel:hover{background:var(--red-soft);color:oklch(0.85 0.09 28)}
  .smi.live{color:var(--accent);font-weight:600}
  .smi.clearall{color:oklch(0.82 0.10 28);border-top:1px solid var(--line);margin-top:4px;padding-top:9px;border-radius:0;justify-content:center}
  .smdiv{height:1px;background:var(--line-soft);margin:4px 2px}
  .cov{position:fixed;inset:0;background:oklch(0 0 0/.55);display:flex;align-items:center;justify-content:center;z-index:200}
  .cbox{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r);padding:var(--space-xl);max-width:360px;width:90%}
  .cmsg{font-size:14px;margin-bottom:var(--space-lg);line-height:1.5}
  .cbtns{display:flex;gap:var(--space-sm);justify-content:flex-end}
  .cbtns .btn{width:auto}
  .btn.danger{background:var(--red);color:oklch(0.18 0.03 28)}
  .btn.danger:hover{background:oklch(0.71 0.15 28)}
  .chips{display:flex;gap:7px}
  .chip{font-size:12.5px;font-weight:600;border-radius:var(--r-sm);padding:5px 10px;white-space:nowrap}
  .chip.red{background:var(--red-soft);color:oklch(0.85 0.09 28)} .chip.amber{background:var(--amber-soft);color:oklch(0.86 0.08 78)} .chip.gray{background:var(--surface-2);color:var(--dim)}
  .linkbtn{background:none;border:none;color:var(--accent);font-size:12.5px;font-weight:600;cursor:pointer;padding:0}
  .scanbar{height:2px;background:transparent;flex:none;overflow:hidden}
  .scanbar.show{background:var(--amber-soft)}
  .scanbar.show::after{content:"";display:block;height:100%;width:35%;background:var(--amber);animation:slide 1.1s ease-in-out infinite}
  @keyframes slide{0%{margin-left:-35%}100%{margin-left:100%}}

  /* ---- shell ---- */
  .shell{flex:1;display:flex;min-height:0}
  .side{width:208px;flex:none;border-right:1px solid var(--line-soft);background:var(--surface);display:flex;flex-direction:column;padding:var(--space-md) var(--space-sm)}
  .nav{display:flex;align-items:center;gap:var(--space-sm);padding:9px 12px;border-radius:var(--r-sm);cursor:pointer;font-size:13.5px;color:var(--dim);border-left:2px solid transparent;user-select:none}
  .nav:hover{background:var(--surface-2);color:var(--text)}
  .nav.on{background:var(--surface-2);color:var(--text);border-left-color:var(--accent)}
  .nav.disabled{opacity:.38;pointer-events:none}
  .nav .lbl{flex:1}
  .nav .cnt{font-size:11.5px;color:var(--faint)}
  .nav.on .cnt{color:var(--dim)}
  .runwrap{margin-top:auto;padding:var(--space-sm) 4px 4px;display:flex;flex-direction:column;gap:8px}
  .aihist{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--dim);cursor:pointer;padding:0 4px}
  .btn{font-family:inherit;font-size:13.5px;font-weight:600;border-radius:var(--r-sm);padding:10px 15px;border:1px solid transparent;cursor:pointer;transition:.15s ease;width:100%}
  .btn:disabled{opacity:.45;cursor:default}
  .btn.primary{background:var(--accent);color:oklch(0.20 0.04 168)}
  .btn.primary:hover:not(:disabled){background:oklch(0.79 0.12 168)}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
  .btn.ghost:hover:not(:disabled){background:var(--surface-2)}

  .panel{flex:1;overflow-y:auto;padding:var(--space-xl) var(--space-2xl)}
  .phead{display:flex;align-items:baseline;gap:var(--space-md);margin-bottom:var(--space-lg)}
  .ptitle{font-size:18px;font-weight:700;letter-spacing:-0.01em}
  .psub{font-size:13px;color:var(--dim)}
  .empty{color:var(--faint);font-size:14px;padding:var(--space-xl) 2px}

  .banner{display:flex;align-items:center;gap:var(--space-md);padding:9px var(--space-lg);background:var(--amber-soft);color:oklch(0.88 0.07 78);font-size:12.5px;font-weight:600;flex:none}

  /* ---- fault table ---- */
  .fhead,.fsum{display:grid;grid-template-columns:16px 96px 1fr 132px 80px;gap:var(--space-md);align-items:center}
  .fhead{padding:0 var(--space-md) 8px;font-size:10.5px;text-transform:uppercase;letter-spacing:0.09em;color:var(--faint);border-bottom:1px solid var(--line-soft)}
  .fhead span{cursor:pointer;user-select:none}
  .fhead span:hover{color:var(--dim)}
  .fgrp{display:flex;align-items:center;gap:var(--space-sm);padding:15px var(--space-md) 6px}
  .fgrp .gn{font-size:11px;font-weight:700;letter-spacing:0.04em;color:var(--text)}
  .fgrp .gf{font-size:11.5px;color:var(--faint)}
  .frow{border-bottom:1px solid var(--line-soft)}
  .fsum{padding:9px var(--space-md);cursor:pointer}
  .fsum:hover{background:var(--surface)}
  .fcaret{color:var(--faint);font-size:11px;transition:transform .2s;display:inline-block}
  .frow.open .fcaret{transform:rotate(90deg)}
  .fcode{font-size:12px;font-weight:600;letter-spacing:0.02em}
  .fdesc{color:var(--dim);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fwhen{font-size:11.5px;color:var(--faint)}
  .pill{font-size:10.5px;font-weight:700;border-radius:99px;padding:3px 9px;white-space:nowrap;text-align:center}
  .pill.red{background:var(--red-soft);color:oklch(0.85 0.09 28)} .pill.amber{background:var(--amber-soft);color:oklch(0.86 0.08 78)}
  .pill.green{background:var(--accent-soft);color:oklch(0.86 0.09 168)} .pill.gray{background:var(--surface-2);color:var(--faint)}
  .drill{display:grid;grid-template-rows:0fr;transition:grid-template-rows .24s cubic-bezier(.22,1,.36,1)}
  .frow.open .drill{grid-template-rows:1fr}
  .drill>.di{overflow:hidden}
  .dpanel{padding:var(--space-md) var(--space-md) var(--space-lg) 44px}
  .dsec{margin-top:var(--space-md)}
  .dsec:first-child{margin-top:6px}
  .dsec h4{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);font-weight:700;margin-bottom:4px}
  .dsec p{color:oklch(0.86 0.01 195);font-size:13.5px;white-space:pre-line}
  .src{margin-top:var(--space-md);font-size:11px;color:var(--faint)}

  /* ---- simple module/chip lists ---- */
  .lrow{display:flex;align-items:center;gap:var(--space-md);padding:10px var(--space-md);border-bottom:1px solid var(--line-soft)}
  .lrow .ln{font-size:13.5px;font-weight:600;flex:1}
  .lrow .lf{font-size:12px;color:var(--faint)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:var(--space-sm);margin-top:var(--space-md)}
  .uchip{padding:var(--space-sm) var(--space-md);background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r-sm)}
  .uchip .ua{font-weight:700;font-size:12.5px} .uchip .un{color:var(--faint);font-size:11.5px;margin-top:1px}
  .uchip.hot{border-color:var(--accent)}

  /* ---- tools ---- */
  .tool{display:flex;align-items:center;gap:var(--space-md);padding:var(--space-lg);border:1px solid var(--line-soft);border-radius:var(--r-sm);margin-bottom:var(--space-md);background:var(--surface)}
  .tool .ti{font-size:13.5px;font-weight:600}
  .tool .td{font-size:12px;color:var(--dim);margin-top:2px}
  .tool .tsp{flex:1}
  .tag{font-size:10px;color:var(--faint);border:1px solid var(--line);border-radius:99px;padding:3px 9px;text-transform:uppercase;letter-spacing:0.06em}
  .toolbtns{display:flex;gap:var(--space-sm);flex-wrap:wrap}
  .toolbtns .btn{width:auto}

  .logview{font-family:"Martian Mono",monospace;font-size:11.5px;line-height:1.6;color:var(--dim);white-space:pre-wrap;background:oklch(0.14 0.01 195);border:1px solid var(--line-soft);border-radius:var(--r-sm);padding:var(--space-md);min-height:60%}

  /* ---- tooltip ---- */
  #tip{position:fixed;top:-999px;left:-999px;z-index:300;background:var(--surface-2);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:6px 9px;font-size:11.5px;font-weight:500;line-height:1.4;max-width:260px;box-shadow:0 4px 16px oklch(0 0 0/.45);pointer-events:none;opacity:0;transition:opacity .1s}
  #tip.show{opacity:1}
  .subtool{display:flex;align-items:center;gap:var(--space-md);padding:11px 0;border-top:1px solid var(--line-soft)}
  .subtool .stx{flex:1}
  .subtool .stn{font-size:12.5px;font-weight:600}
  .subtool .std{font-size:11.5px;color:var(--faint);margin-top:2px;line-height:1.4}
  .subtool .btn{width:auto;flex:none;padding:7px 14px;font-size:12.5px}
  .clrow{display:flex;align-items:center;gap:10px;padding:7px 4px;border-bottom:1px solid var(--line-soft);cursor:pointer;font-size:13px}
  .clrow .cln{flex:1}
  .clrow .clc{display:flex;gap:5px}
  .clrow .clc .pill{font-size:10px;padding:2px 7px}
  /* history view */
  .hrow{display:flex;align-items:center;gap:12px;padding:8px 12px;border-bottom:1px solid var(--line-soft)}
  .hrow.scan{cursor:pointer}
  .hrow.scan:hover,.hrow.on{background:var(--surface-2)}
  .hrow .hwhen{color:var(--dim);font-size:12px;min-width:130px}
  .hrow .hsum{font-size:13px}
  .hrow.clear{background:var(--amber-soft);color:oklch(0.86 0.08 78);font-weight:600;font-size:12.5px}
  .hdiff{padding:8px 12px 12px 26px;border-bottom:1px solid var(--line-soft);background:var(--bg)}
  .dgrp{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;margin:8px 0 3px}
  .drow{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:2px 0}
  .drow .dsign{width:12px;font-weight:700;text-align:center}
  .drow.appeared .dsign{color:var(--red)} .drow.resolved .dsign{color:var(--accent)}
  .drow .dmod{min-width:62px;color:var(--dim)}
  .dcomm{font-size:12px;color:var(--faint);margin-top:8px;font-style:italic}
  .chist{display:flex;flex-direction:column;gap:2px;font-size:12px;color:var(--dim)}
  .empty.small{padding:8px 0;font-size:12px}
  .tool input{background:var(--surface-2);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:6px 8px;font-family:ui-monospace,monospace;font-size:12.5px}
</style>
</head>
<body data-version="__FK_VERSION__">
<div class="app">
  <div class="top">
    <div class="conn"><span class="pulse" id="dot"></span><div><div class="dev" id="dev">Fiskeretta</div><div class="st" id="connText">starting…</div></div></div>
    <div class="veh" id="veh"><div class="model">connecting to the dongle…</div></div>
    <div class="topsp"></div>
    <div class="scanind" id="scanInd"><span class="spin"></span><span id="scanIndText">Scanning…</span></div>
    <button class="linkbtn" id="reconnect" style="display:none" data-tip="Reconnect to the saved dongle over Bluetooth">Reconnect</button>
    <button class="linkbtn" id="stopbtn" style="display:none" onclick="stopOp()" data-tip="Stop the connection attempt">Stop</button>
    <div class="scandrop" id="scanDrop" data-tip="Browse, load, or delete saved scans. Loading one shows that snapshot; the action buttons stay tied to your live car."><button class="scantrig" id="scanTrig">Live (latest)</button><div class="scanmenu" id="scanMenu" hidden></div></div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="scanbar" id="scanBar"></div>
  <div class="banner" id="onboardBanner" style="display:none"></div>
  <div class="shell">
    <div class="side">
      <div id="nav"></div>
      <div class="runwrap"><button class="btn ghost" id="aiBtn" disabled onclick="exportAi()" data-tip="Copies a research prompt with your active faults to paste into any AI">Export for AI</button><label class="aihist" data-tip="Also include historical (previously-seen) faults in the prompt"><input type="checkbox" id="aiHist"> include historical</label><button class="btn primary" id="run" disabled data-tip="Read every module on the car for fault codes">Run scan</button></div>
      <div class="appfoot" style="margin-top:12px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim)"><button class="linkbtn" onclick="showAbout()" data-tip="Version, fault-code catalogue status, and the safety notice">About</button><span id="ver"></span></div>
    </div>
    <div class="panel" id="panel"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => (s==null?"":String(s)).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const fmtWhen = (iso) => { try { return new Date(iso).toLocaleString([], {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); } catch(e){ return iso; } };

let connected=false, busy=false, connecting=false, started=false, accepted=false;
let liveResult=null, view=null, viewingSaved=false, viewingSavedId=null, savedScans=[];
let cur="active", sortKey="code", sortDir=1, logBuf=[], lastDiscovery=[], lastMonitor=[];
let showComm=false;
let lastHistory=[], histSel=null, diffCache={};
let lastGenericObd=null, lastDidSweep=null, didRange={start:"F180",end:"F1FF"};

const NAV=[["active","Active faults"],["historical","Historical"],["healthy","Healthy"],["unreachable","Unreachable"],["history","History"],["log","Activity log"],["tools","Tools"]];

function copyText(t){
  if(navigator.clipboard&&navigator.clipboard.writeText) return navigator.clipboard.writeText(t);
  const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";
  document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}ta.remove();return Promise.resolve();
}

const ws=new WebSocket(`ws://${location.host}/ws`);
const send=(command)=>ws.send(JSON.stringify({command}));
const sendMsg=(o)=>ws.send(JSON.stringify(o));
ws.onopen=()=>{ log("Connected to Fiskeretta Diagnostics."); send("saved_scans"); };
ws.onclose=()=>{connected=false;connecting=false;busy=false;$("connText").textContent="server connection lost";$("reconnect").style.display="inline";$("stopbtn").style.display="none";paintDot();paintRun();};
ws.onmessage=(e)=>{
  const m=JSON.parse(e.data);
  if(m.type==="log") log(m.message);
  else if(m.type==="app") onApp(m);
  else if(m.type==="status") onStatus(m.value);
  else if(m.type==="scan_progress") $("scanIndText").textContent=`Scanning… ${m.done}/${m.total} modules`;
  else if(m.type==="connection") onConnection(m);
  else if(m.type==="scan_result") onScan(m.result, !!m.saved);
  else if(m.type==="saved_scans"){ savedScans=m.scans||[]; if(viewingSaved&&!savedScans.find(x=>x.id===viewingSavedId)) returnToLive(); else renderScanSel(); }
  else if(m.type==="code_detail") onCodeDetail(m);
  else if(m.type==="clear_result") onClearResult(m);
  else if(m.type==="module_check") onModuleCheck(m);
  else if(m.type==="discovery"){ lastDiscovery=m.ecus||[]; if(cur==="tools") renderPanel(); }
  else if(m.type==="monitor"){ lastMonitor=m.ids||[]; if(cur==="tools") renderPanel(); }
  else if(m.type==="history"){ lastHistory=m.items||[]; if(cur==="history") renderPanel(); }
  else if(m.type==="scan_diff"){ diffCache[m.scan_id]=m.diff; if(cur==="history") renderPanel(); }
  else if(m.type==="code_history"){ onCodeHistory(m); }
  else if(m.type==="generic_obd"){ lastGenericObd=m; if(cur==="tools") renderPanel(); }
  else if(m.type==="did_sweep"){ lastDidSweep=m; if(cur==="tools") renderPanel(); }
  else if(m.type==="export_result"){ m.ok?infoModal("History exported",`Saved to:<br><span class="mono" style="font-size:12px">${esc(m.path)}</span>`):infoModal("Export failed",esc(m.error||"Could not write the export.")); }
  else if(m.type==="import_result"){ m.ok?infoModal("History imported",`Added ${m.scans_added||0} scan${m.scans_added===1?"":"s"} and ${m.events_added||0} event${m.events_added===1?"":"s"}. Existing data was kept.`):infoModal("Import failed",esc(m.error||"That doesn't look like a Fiskeretta history export.")); }
  else if(m.type==="device_picker") showDevicePicker(m.devices||[]);
};

function onConnection(m){
  connected=m.connected;
  if(connected){ connecting=false; closeDevicePicker(); }
  $("dev").textContent=connected?"Vgate vLinker FD+":"Fiskeretta";
  if(connected) maybeAutoScan();
  paintConn(); paintRun();
}
// Kick off the first scan once we're both connected AND the user has accepted
// the disclaimer — never read the car before they click Continue. Connecting to
// the dongle is allowed to happen while the disclaimer is still up.
function maybeAutoScan(){
  // A picker may have been deferred while the disclaimer was up — show it now.
  if(accepted && pendingPicker){ const d=pendingPicker; pendingPicker=null; showDevicePicker(d); }
  if(!accepted || started || !connected) return;
  started=true;
  send("saved_scans");
  send("scan");
}

// Seed the version from the server-injected body attribute so About/the footer
// show it immediately, independent of the websocket. The "__"-guard keeps the
// raw placeholder from leaking if the page is ever served without substitution.
let appVersion=(()=>{ const v=document.body.dataset.version||""; return /^__.*__$/.test(v)?"":v; })();
let catalogLoaded=false, catalogCount=0;
function paintVersion(){ const v=$("ver"); if(v) v.textContent=appVersion?("v"+appVersion):""; }
function onApp(m){
  appVersion=m.version||appVersion; catalogLoaded=!!m.catalog; catalogCount=m.catalog_count||0;
  paintVersion();
}

    <div style="font-size:11px;color:var(--dim);margin-bottom:16px">Built on protocol knowledge published by the Fisker Owners Association community (puddletools/CAN, puddletools/SaavyScripts).</div>

function onStatus(v){
  connecting=(v==="connecting");
  busy=(v==="running");
  $("scanInd").classList.toggle("show",busy); $("scanBar").classList.toggle("show",busy);
  if(busy) $("scanIndText").textContent="Scanning…";
  paintConn(); paintRun();

}
function paintDot(){ $("dot").className="pulse"+((connecting||busy)?" busy work":(connected?" on":"")); }
function paintConn(){
  $("connText").textContent=connecting?"connecting…":(connected?"connected":"not connected");
  $("reconnect").style.display=(!connected&&!connecting)?"inline":"none";
  $("stopbtn").style.display=connecting?"inline":"none";
  paintDot(); paintVeh();
  // Persistent onboarding strip: whenever we're not connected (and not mid-
  // connect), tell the user exactly what to do — even if a prior scan is on
  // screen. The header's Reconnect button sits right above for the action.
  const ob=$("onboardBanner");
  if(ob){
    if(!connected && !connecting){
      ob.style.display="flex";
      ob.textContent="Not connected — plug the vLinker into the car's OBD2 port and switch the car to ON (Ready). Fiskeretta finds the dongle and connects automatically. Use a genuine Vgate vLinker FD+ or OBDLink CX — cheap no-name “OBDII BLE” clones have unreliable CAN error handling and may miss or corrupt codes.";
    } else { ob.style.display="none"; }
  }
  if(!view) renderPanel();  // keep the onboarding/empty-state hint in step with the live state
}
// Header subtitle: an at-a-glance onboarding hint whenever there's no scan on
// screen yet. A loaded scan replaces this with the vehicle line (renderTop).
function paintVeh(){
  if(view) return;
  const t=connecting?"Connecting to the dongle…"
    :busy?"Reading the car…"
    :connected?"Connected — ready"
    :"Not connected · plug the vLinker into the OBD2 port, switch the car ON";
  $("veh").innerHTML=`<div class="model">${t}</div>`;
}
function paintRun(){
  const b=$("run");
  b.textContent=busy?"Cancel":"Run scan";
  b.classList.toggle("primary",!busy);
  b.classList.toggle("ghost",busy);
  b.disabled=busy?false:!connected;
}
function stopOp(){ sendMsg({command:"cancel"}); }
window.stopOp=stopOp;

function onScan(r, saved){
  if(saved){ view=r; viewingSaved=true; }
  else { liveResult=r; if(!viewingSaved){ view=r; } }
  busy=false; connecting=false;
  $("scanInd").classList.remove("show"); $("scanBar").classList.remove("show");
  paintConn(); paintRun();
  renderTop(); renderNav(); renderPanel(); renderScanSel();
}
function returnToLive(){ viewingSaved=false; viewingSavedId=null; view=liveResult; renderTop(); renderNav(); renderPanel(); renderScanSel(); }

/* ---- top bar ---- */
function renderTop(){
  const v=(view&&view.vehicle)||{}, s=(view&&view.summary)||{};
  const bits=[v.year,v.make,v.model,v.series].filter(Boolean).join(" ");
  const drive=v.ev_drive?" · "+v.ev_drive:(v.drive_type?" · "+v.drive_type:"");
  $("veh").innerHTML=`<div class="vin mono">${esc(v.vin||"—")}</div><div class="model">${esc(bits||"Vehicle")}${esc(drive)}</div>`;
  const histShown=(s.historical||0)-(s.comm||0);
  $("chips").innerHTML=`<span class="chip ${s.active?"red":"gray"} tnum">${s.active||0} active</span><span class="chip ${histShown?"amber":"gray"} tnum">${histShown} historical</span><span class="chip gray tnum">${s.modules_reachable||0} of ${s.modules_total||0} online</span>`;

}
function renderScanSel(){
  const cur=viewingSaved?savedScans.find(x=>x.id===viewingSavedId):null;
  $("scanTrig").textContent=cur?fmtWhen(cur.scanned_at):(viewingSaved?"Saved scan":"Live (latest)");
  let h=`<div class="smi live" onclick="pickLive()">Live (latest)</div>`;
  if(savedScans.length) h+=`<div class="smdiv"></div>`;
  h+=savedScans.map(s=>`<div class="smi" onclick="pickScan('${esc(s.id)}')"><span class="smtxt">${esc(fmtWhen(s.scanned_at)||s.id)} · ${s.active||0}a ${(s.historical||0)-(s.comm||0)}h</span><span class="smdel" data-tip="Delete this scan" onclick="event.stopPropagation();delScan('${esc(s.id)}')">✕</span></div>`).join("");
  if(savedScans.length) h+=`<div class="smi clearall" onclick="clearAllScans()">Clear all saved scans</div>`;
  $("scanMenu").innerHTML=h;
}
$("scanTrig").addEventListener("click",e=>{ e.stopPropagation(); $("scanMenu").hidden=!$("scanMenu").hidden; });
$("scanMenu").addEventListener("click",e=>e.stopPropagation());
document.addEventListener("click",()=>{ $("scanMenu").hidden=true; });
function pickLive(){ $("scanMenu").hidden=true; returnToLive(); }
function pickScan(id){ $("scanMenu").hidden=true; viewingSavedId=id; sendMsg({command:"load_scan", scan_id:id}); }
function delScan(id){ confirmAction("Delete this saved scan? This can't be undone.", ()=>sendMsg({command:"delete_scan", scan_id:id})); }
function clearAllScans(){ $("scanMenu").hidden=true; confirmAction(`Delete all ${savedScans.length} saved scan${savedScans.length===1?"":"s"}? This can't be undone.`, ()=>sendMsg({command:"clear_scans"})); }
function confirmAction(msg,onYes){
  const ov=document.createElement("div"); ov.className="cov";
  ov.innerHTML=`<div class="cbox"><div class="cmsg"></div><div class="cbtns"><button class="btn ghost" data-no>Cancel</button><button class="btn danger" data-yes>Delete</button></div></div>`;
  ov.querySelector(".cmsg").textContent=msg;
  ov.querySelector("[data-no]").onclick=()=>ov.remove();
  ov.querySelector("[data-yes]").onclick=()=>{ ov.remove(); onYes(); };
  ov.onclick=(e)=>{ if(e.target===ov) ov.remove(); };
  document.body.appendChild(ov);
}
window.pickLive=pickLive; window.pickScan=pickScan; window.delScan=delScan; window.clearAllScans=clearAllScans; window.confirmAction=confirmAction;

/* ---- device picker (shown when the dongle can't be auto-identified) ---- */
let devPickerEl=null, pendingPicker=null;
function showDevicePicker(devices){
  // Don't pop the picker over the first-run disclaimer — stash it until accepted.
  if(!accepted){ pendingPicker=devices; return; }
  if(devPickerEl) devPickerEl.remove();
  const rows = devices.length ? devices.map(d=>{
    const name=d.name||"(unnamed device)";
    const rssi=(d.rssi!=null)?`${d.rssi} dBm`:"";
    const likely=d.likely?`<span class="pill green" style="margin-left:8px">likely</span>`:"";
    return `<div class="clrow dpick" data-addr="${esc(d.address)}" data-name="${esc(d.name||"")}" style="cursor:pointer">
      <span class="cln">${esc(name)}${likely}<div class="mono" style="font-size:11px;color:var(--faint);margin-top:2px">${esc(d.address)}</div></span>
      <span class="lf mono">${esc(rssi)}</span></div>`;
  }).join("") : `<div class="empty">No Bluetooth devices found. Make sure the vLinker is plugged into the OBD2 port, the car is awake (ON/Ready), and Bluetooth is on — then Rescan.</div>`;
  const ov=document.createElement("div"); ov.className="cov"; ov.style.zIndex="550";
  ov.innerHTML=`<div class="cbox" style="max-width:470px">
    <div style="font-weight:700;font-size:16px;margin-bottom:6px">Select your OBD2 adapter</div>
    <div style="font-size:12.5px;color:var(--dim);margin-bottom:14px">Fiskeretta couldn't identify the vLinker automatically (common on Windows, where the adapter's name isn't always broadcast). Pick it from the Bluetooth devices found below — it usually has a strong signal and may be tagged "likely". Your choice is remembered for next time.</div>
    <div id="devList" style="max-height:46vh;overflow-y:auto;margin-bottom:12px">${rows}</div>
    <div id="devStatus" style="font-size:12px;color:var(--dim);min-height:16px;margin-bottom:12px"></div>
    <div class="cbtns"><button class="btn ghost" id="devRescan" style="width:auto">Rescan</button><button class="btn ghost" id="devClose" style="width:auto">Cancel</button></div>
  </div>`;
  document.body.appendChild(ov);
  devPickerEl=ov;
  ov.querySelectorAll(".dpick").forEach(r=>r.onclick=()=>{
    const addr=r.dataset.addr, name=r.dataset.name;
    $("devStatus").textContent=`Connecting to ${name||addr}…`;
    sendMsg({command:"connect_device", address:addr, name:name});
  });
  ov.querySelector("#devRescan").onclick=()=>{ $("devStatus").textContent="Rescanning…"; send("connect"); };
  ov.querySelector("#devClose").onclick=()=>closeDevicePicker();
}
function closeDevicePicker(){ if(devPickerEl){ devPickerEl.remove(); devPickerEl=null; } pendingPicker=null; }
window.showDevicePicker=showDevicePicker; window.closeDevicePicker=closeDevicePicker;

/* ---- sidebar ---- */
function tierCounts(){
  const mods=(view&&view.modules)||[], s=(view&&view.summary)||{};
  return {active:s.active||0, historical:(s.historical||0)-(s.comm||0),
    healthy:mods.filter(m=>m.status==="clear").length,
    unreachable:mods.filter(m=>m.status==="unreachable").length};
}
function renderNav(){
  const c=tierCounts();
  $("nav").innerHTML=NAV.map(([k,label])=>{
    const cnt=k in c?`<span class="cnt tnum">${c[k]}</span>`:"";
    const dis=(viewingSaved&&(k==="log"||k==="tools"))?" disabled":"";
    return `<div class="nav${k===cur?" on":""}${dis}" data-k="${k}"${tipFor(k)}><span class="lbl">${label}</span>${cnt}</div>`;
  }).join("");
}
function tipFor(k){
  const t={active:"Faults failing right now",historical:"Stored faults not currently failing",healthy:"Modules with no stored faults",unreachable:"Modules that didn't answer, plus ones we haven't reached",history:"Timeline of scans and clears, with per-scan changes",log:"Adapter and scan output",tools:"Clear codes, find modules, advanced discovery"}[k];
  return t?` data-tip="${t}"`:"";
}
$("nav").addEventListener("click",e=>{
  const n=e.target.closest(".nav"); if(!n||n.classList.contains("disabled")) return;
  cur=n.dataset.k; if(cur==="history") send("history"); renderNav(); renderPanel();
});
$("run").addEventListener("click",()=>{ if(busy){ stopOp(); return; } if(connected){ if(viewingSaved) returnToLive(); send("scan"); } });
$("reconnect").addEventListener("click",()=>send("connect"));

/* ---- panels ---- */
function renderPanel(){
  const p=$("panel");
  if(!view&&cur!=="log"&&cur!=="tools"&&cur!=="history"){
    const onboard="Plug the vLinker into the car's OBD2 port and switch the car to ON (Ready). Fiskeretta finds the dongle and connects on its own — no setup needed.";
    const msg=busy?"Reading the car… one moment."
      :connecting?("Connecting to the dongle… "+onboard)
      :connected?"Connected. Press Run scan to read the car."
      :(savedScans.length?("Not connected. "+onboard+" Or pick a saved scan from the dropdown above to browse it.")
        :("Not connected. "+onboard));
    p.innerHTML=`<div class="empty">${msg}</div>`; return;
  }
  const banner=viewingSaved?`<div class="banner">Viewing saved scan · ${esc(fmtWhen(view.scanned_at))} <button class="linkbtn" onclick="returnToLive()">Return to live</button></div>`:"";
  p.innerHTML=banner+({active:panelFaults("active"),historical:panelFaults("historical"),healthy:panelHealthy(),unreachable:panelUnreachable(),history:panelHistory(),log:panelLog(),tools:panelTools()}[cur]||"");
}
const isActive=c=>c.failing_now;
const isHistFault=c=>!c.failing_now && c.tier!=="comm";
const isComm=c=>!c.failing_now && c.tier==="comm";
function groups(pred){
  return ((view&&view.modules)||[]).map(m=>({name:m.name,label:m.label,codes:(m.codes||[]).filter(pred)})).filter(g=>g.codes.length);
}
function sortCodes(list){
  return [...list].sort((a,b)=>{
    let A,B;
    if(sortKey==="desc"){A=a.description||"";B=b.description||"";}
    else if(sortKey==="when"){A=a._when||"~";B=b._when||"~";}
    else {A=a.j2012||a.code;B=b.j2012||b.code;}
    return A<B?-sortDir:A>B?sortDir:0;
  });
}
function caret(k){return sortKey===k?(sortDir>0?" ▲":" ▼"):"";}
const COLS=`<div class="fhead"><span></span><span data-k="code" onclick="setSort('code')">Code${caret("code")}</span><span data-k="desc" onclick="setSort('desc')">Description${caret("desc")}</span><span data-k="when" onclick="setSort('when')">When${caret("when")}</span><span>Status</span></div>`;
function renderGroups(gs,tone){
  return gs.map(g=>`<div class="fgrp"><span class="gn">${esc(g.name.toUpperCase())}</span><span class="gf">${esc(g.label)} · ${g.codes.length}</span></div>`+
    sortCodes(g.codes).map(c=>faultRow(c,g,tone)).join("")).join("");
}
function panelFaults(tone){
  const s=(view&&view.summary)||{};
  if(tone==="active"){
    const gs=groups(isActive);
    const head=`<div class="phead"><span class="ptitle">Active faults</span><span class="psub">${s.active||0} failing now across ${gs.length} module${gs.length===1?"":"s"}</span></div>`;
    if(!gs.length) return head+`<div class="empty">No active faults — nothing failing right now.</div>`;
    return head+COLS+renderGroups(gs,"active");
  }
  // Historical: real stored faults shown; communication (network) codes split
  // into a collapsed section, hidden by default — they re-accumulate as benign
  // noise on a parked car and shouldn't read as 30 scary faults.
  const gs=groups(isHistFault), commGs=groups(isComm);
  const commCount=commGs.reduce((a,g)=>a+g.codes.length,0);
  const histN=(s.historical||0)-(s.comm||0);
  const head=`<div class="phead"><span class="ptitle">Historical faults</span><span class="psub">${histN} stored across ${gs.length} module${gs.length===1?"":"s"}</span></div>`;
  if(!gs.length && !commGs.length) return head+`<div class="empty">No historical faults stored.</div>`;
  let out=head;
  if(gs.length) out+=COLS+renderGroups(gs,"historical");
  else out+=`<div class="empty">No historical faults stored — only communication codes below.</div>`;
  if(commGs.length){
    out+=`<div class="fgrp commbar" style="cursor:pointer" onclick="toggleComm()"><span class="gn">${showComm?"▾":"▸"} COMMUNICATION</span><span class="gf">${commCount} network code${commCount===1?"":"s"} · a common occurrence, not a fault unless still active</span></div>`;
    if(showComm) out+=(gs.length?"":COLS)+renderGroups(commGs,"comm");
  }
  return out;
}
function faultRow(c,g,tone){
  const fail=c.failing_now;
  const pill=fail?`<span class="pill red">active</span>`
    :(c.tier==="comm"?`<span class="pill gray">comm</span>`:`<span class="pill amber">history</span>`);
  return `<div class="frow" data-module="${esc(g.name)}" data-code="${esc(c.code)}">
    <div class="fsum" onclick="toggleRow(this.parentElement)">
      <span class="fcaret">▸</span>
      <span class="fcode mono">${esc(c.j2012||c.code)}</span>
      <span class="fdesc">${esc(c.description||"(no description)")}</span>
      <span class="fwhen mono">—</span>
      ${pill}
    </div>
    <div class="drill"><div class="di"><div class="dpanel">${drillHTML(c)}</div></div></div>
  </div>`;
}
function toggleComm(){ showComm=!showComm; renderPanel(); }
window.toggleComm=toggleComm;
function drillHTML(c){
  let h=`<div class="dsec"><h4>When it happened</h4><p class="occ">—</p></div>`;
  h+=`<div class="dsec"><h4>History across your scans</h4><div class="chist">—</div></div>`;
  const meaning=c.subsystem||c.description;
  if(meaning) h+=`<div class="dsec"><h4>What it means</h4><p>${esc(meaning)}</p></div>`;
  if(c.failure_event) h+=`<div class="dsec"><h4>Failure condition</h4><p>${esc(c.failure_event)}</p></div>`;
  if(c.impact) h+=`<div class="dsec"><h4>Impact</h4><p>${esc(c.impact)}</p></div>`;
  if(c.limp) h+=`<div class="dsec"><h4>When active, the car…</h4><p>${esc(c.limp)}</p></div>`;
  if(c.steps) h+=`<div class="dsec"><h4>Diagnostic steps</h4><p>${esc(c.steps)}</p></div>`;
  if(c.repair&&c.repair!==c.steps) h+=`<div class="dsec"><h4>Repair</h4><p>${esc(c.repair)}</p></div>`;
  if(c.trigger) h+=`<div class="dsec"><h4>Sets / clears when</h4><p style="color:var(--faint);font-size:12px">${esc(c.trigger.replace(/[\x00-\x1f]/g," "))}</p></div>`;
  h+=`<div class="src">SAE ${esc(c.j2012||"—")}${c.page?" · manual p"+c.page:""} · status 0x${(c.status_byte||0).toString(16).toUpperCase().padStart(2,"0")} · Fisker DTC manual + community list</div>`;
  return h;
}
function toggleRow(el){
  const opening=!el.classList.contains("open");
  el.classList.toggle("open");
  if(opening&&!el.dataset.fetched){
    el.dataset.fetched="1";
    const occ=el.querySelector(".occ");
    // Cross-scan history reads saved scan files, so it works even on a saved view.
    sendMsg({command:"code_history", module:el.dataset.module, code:el.dataset.code});
    if(viewingSaved){ if(occ) occ.textContent="Saved snapshot — connect live to read on-car fault history."; return; }
    if(occ) occ.textContent="Reading fault history…";
    sendMsg({command:"code_detail", module:el.dataset.module, code:el.dataset.code});
  }
}
function onCodeDetail(m){
  const el=document.querySelector(`.frow[data-module="${m.module}"][data-code="${m.code}"]`);
  if(!el) return;
  const occ=el.querySelector(".occ");
  if(!m.available){ if(occ) occ.textContent="No freeze-frame stored for this code."; return; }
  const L=m.latest||{}, parts=[];
  if(L.odometer_mi!=null) parts.push(L.odometer_mi.toLocaleString()+" mi");
  if(L.timestamp) parts.push(L.timestamp); else if(L.timestamp_unset) parts.push("clock not set");
  let txt=parts.join(" · ")||"recorded (no odometer/time)";
  const n=(m.records||[]).length; if(n>1) txt+=` — seen ${n}×`;
  if(occ) occ.textContent=txt;
  const w=el.querySelector(".fwhen"); if(w&&parts.length) w.textContent=parts.slice(0,2).join(" · ");
}
function onCodeHistory(m){
  const el=document.querySelector(`.frow[data-module="${m.module}"][data-code="${m.code}"]`);
  if(!el) return;
  const box=el.querySelector(".chist");
  if(!box) return;
  const h=m.history||[];
  if(!h.length){ box.textContent="Only seen in the current scan."; return; }
  box.innerHTML=h.map(e=>{
    const st=e.failing_now?"active":(e.tier==="comm"?"comm":"historical");
    return `<span>${esc(fmtWhen(e.when))} — ${esc(st)}</span>`;
  }).join("")+(h.length>1?`<span style="color:var(--faint);margin-top:3px">Seen in ${h.length} of your scans${h.some(e=>e.failing_now)&&h.some(e=>!e.failing_now)?" — recurring":""}.</span>`:"");
}
window.setSort=function(k){ if(sortKey===k) sortDir*=-1; else {sortKey=k;sortDir=1;} renderPanel(); };
window.toggleRow=toggleRow; window.returnToLive=returnToLive;

function panelHealthy(){
  const gs=((view&&view.modules)||[]).filter(m=>m.status==="clear");
  const head=`<div class="phead"><span class="ptitle">Healthy</span><span class="psub">${gs.length} module${gs.length===1?"":"s"} reachable with no stored faults</span></div>`;
  if(!gs.length) return head+`<div class="empty">No healthy modules in this scan.</div>`;
  return head+gs.map(m=>`<div class="lrow"><span class="ln">${esc(m.label)}</span><span class="lf mono">${esc(m.name.toUpperCase())}</span><span class="pill green">clear</span></div>`).join("");
}
function panelUnreachable(){
  const mods=(view&&view.modules)||[];
  const unreach=mods.filter(m=>m.status==="unreachable"), nr=mods.filter(m=>m.status==="not_reached");
  let h=`<div class="phead"><span class="ptitle">Unreachable</span><span class="psub">${unreach.length} didn't answer · ${nr.length} not yet reached</span></div>`;
  if(unreach.length) h+=unreach.map(m=>`<div class="lrow"><span class="ln">${esc(m.label)}</span><span class="lf mono">${esc(m.name.toUpperCase())}</span><span class="pill gray">no response</span></div>`).join("");
  if(nr.length){
    h+=`<div class="fgrp"><span class="gn">NOT YET REACHED</span><span class="gf">documented in the manual, no address found</span></div><div class="grid">`;
    h+=nr.map(m=>`<div class="uchip"><div class="ua">${esc(m.name.toUpperCase())}</div><div class="un">${esc(m.label)}</div></div>`).join("")+`</div><div class="psub" style="margin-top:14px">Use Tools → Find modules to probe for these.</div>`;
  }
  return h;
}
function panelHistory(){
  const items=lastHistory||[];
  const head=`<div class="phead"><span class="ptitle">History</span><span class="psub">${items.length} event${items.length===1?"":"s"} · newest first · click a scan for changes</span></div>`;
  if(!items.length) return head+`<div class="empty">No history yet. Run a scan to start the timeline.</div>`;
  return head+items.map(it=>{
    if(it.kind==="clear"){
      const w=it.wiped||{};
      return `<div class="hrow clear"><span class="hwhen mono">${esc(fmtWhen(it.when))}</span><span>Cleared — wiped ${w.active||0} active / ${w.historical||0} historical${w.comm?` / ${w.comm} comm`:""}</span></div>`;
    }
    const comm=it.comm||0, hist=(it.historical||0)-comm, sel=it.id&&it.id===histSel;
    return `<div class="hrow scan${sel?" on":""}" onclick="selHist('${esc(it.id||"")}')">`+
      `<span class="hwhen mono">${esc(fmtWhen(it.when))}</span>`+
      `<span class="hsum">${it.active||0} active · ${hist} historical${comm?` · ${comm} comm`:""}</span></div>`+
      (sel?`<div class="hdiff">${renderDiff(it.id)}</div>`:"");
  }).join("");
}
function selHist(id){
  if(!id) return;
  histSel = histSel===id ? null : id;
  if(histSel && !(histSel in diffCache)) sendMsg({command:"scan_diff", scan_id:histSel});
  renderPanel();
}
function renderDiff(id){
  const d=diffCache[id];
  if(!d) return `<div class="empty small">Computing changes…</div>`;
  const rows=(arr,kind)=>arr.map(r=>`<div class="drow ${kind}"><span class="dsign">${kind==="appeared"?"+":"−"}</span><span class="dmod mono">${esc((r.module||"").toUpperCase())}</span><span class="dcode mono">${esc(r.j2012||r.code)}</span>${r.failing_now?`<span class="pill red">active</span>`:``}</div>`).join("");
  let h="";
  if(d.appeared.length) h+=`<div class="dgrp">+${d.appeared.length} appeared</div>`+rows(d.appeared,"appeared");
  if(d.resolved.length) h+=`<div class="dgrp">−${d.resolved.length} resolved</div>`+rows(d.resolved,"resolved");
  if(d.comm_appeared||d.comm_resolved){
    const parts=[]; if(d.comm_appeared)parts.push(`+${d.comm_appeared}`); if(d.comm_resolved)parts.push(`−${d.comm_resolved}`);
    const tot=(d.comm_appeared||0)+(d.comm_resolved||0);
    h+=`<div class="dcomm">${parts.join(" / ")} communication code${tot===1?"":"s"} — common churn, collapsed</div>`;
  }
  if(!h) h=`<div class="empty small">No changes from the previous scan.</div>`;
  return h;
}
window.selHist=selHist;
function panelLog(){

function panelTools(){
  let h=`<div class="phead"><span class="ptitle">Tools</span><span class="psub">service actions</span></div>`;
  h+=clearCard();
  h+=`<div class="tool"><div style="flex:1"><div class="ti">Check for extra modules</div><div class="td">A normal scan reads the modules the app already knows about. This sends one quick broadcast to see whether your car has any control units beyond that set — and if it turns up something unknown, it's added to your scan set and you're offered to send it to the developer so it can be identified and added for everyone. Safe; takes a few seconds.</div><div class="toolbtns" style="margin-top:10px"><button class="btn ghost" ${gate()} onclick="checkModules()" data-tip="One broadcast that lists every module and flags anything not in the app's database">Check now</button></div></div></div>`;
  h+=`<div class="tool"><div style="flex:1"><div class="ti">Check for generic OBD</div><div class="td">The Ocean speaks manufacturer UDS, not the legislated emissions OBD-II that off-the-shelf scanners rely on — which is why a generic scanner shows almost nothing. This sends the standard OBD-II requests (modes 01 / 09 / 03) to 0x7DF to confirm whether the car answers any of them. Safe; a couple of seconds.</div><div class="toolbtns" style="margin-top:10px"><button class="btn ghost" ${gate()} onclick="startGenericObd()" data-tip="Send legislated OBD-II requests on 0x7DF to see if the car answers">Run probe</button></div>${genericObdResult()}</div></div>`;
  h+=`<div class="tool"><div style="flex:1"><div class="ti">Battery / live-data sweep <span style="font-size:11px;color:var(--faint)">(experimental)</span></div><div class="td">Walks UDS 0x22 data identifiers on the BMS (0x7E1) and lists which respond, with their raw bytes — the groundwork for reading HV state of charge, state of health, cell voltages and temperatures. No public DID list exists for the Ocean, so this discovers them; decoded names show for DIDs we've confirmed. One request per DID, so large ranges are slow — start narrow. Read-only and safe.</div><div class="toolbtns" style="margin-top:10px;align-items:center"><span style="font-size:12px;color:var(--faint)">DIDs (hex)</span><input id="didStart" value="${esc(didRange.start)}" style="width:60px" data-tip="Start DID (hex)"><span style="color:var(--faint)">–</span><input id="didEnd" value="${esc(didRange.end)}" style="width:60px" data-tip="End DID (hex)"><button class="btn ghost" ${gate()} onclick="startBmsSweep()" data-tip="Read every DID in the range from the BMS and list the responders">Sweep</button></div>${didSweepResult()}</div></div>`;
  h+=`<div class="tool"><div style="flex:1"><div class="ti">Data &amp; history</div><div class="td">Your scans and history live in a folder on this computer and survive app updates. Export bundles them into one zip you can back up or move to another machine; import merges a zip back in without overwriting newer data. No connection needed.</div><div class="toolbtns" style="margin-top:10px;gap:8px"><button class="btn ghost" onclick="exportHistory()" data-tip="Save all scans + history to a zip on your Desktop">Export</button><button class="btn ghost" onclick="importHistory()" data-tip="Merge a previously exported history zip">Import</button><button class="btn ghost" onclick="revealFolder()" data-tip="Open the data folder in Finder / Explorer">Reveal data folder</button></div></div></div>`;
  return h;
}

function importHistory(){

function genericObdResult(){

    ? `<span style="color:var(--amber)">Generic OBD present — the car answered a legislated mode.</span>`

}

}

/* ---- export for AI ---- */
function buildAiPrompt(includeHist){
  const v=(view&&view.vehicle)||{};
  const car=[v.year,"Fisker Ocean",v.series].filter(Boolean).join(" ")||"Fisker Ocean";
  const drive=v.ev_drive?` (${v.ev_drive})`:(v.drive_type?` (${v.drive_type})`:"");
  function grp(pred){
    return ((view&&view.modules)||[]).map(m=>({label:m.label,codes:(m.codes||[]).filter(pred)})).filter(g=>g.codes.length)
      .map(g=>`${g.label}\n`+g.codes.map(c=>`  • ${c.j2012||c.code} — ${c.description||""}${c.impact?` (${c.impact})`:""}`).join("\n")).join("\n");
  }
  let p=`I own a ${car}${drive}. Fisker went bankrupt, so there's no manufacturer support — the owner community is the main source of real fixes. I pulled these diagnostic trouble codes from my car with a free OBD2 tool. For EACH code, I want practical, real-world info from other Fisker owners: the likely cause, how serious it is (is it safe to drive?), and how people have actually fixed it.

MY ACTIVE FAULTS
${grp(c=>c.failing_now)||"(none)"}
`;
  if(includeHist){
    // Exclude comm-tier (network bus-timeout) codes — they're benign parked-car
    // noise and shouldn't be sent to an AI as faults to research.
    const h=grp(c=>!c.failing_now && c.tier!=="comm");
    if(h) p+=`\nPREVIOUSLY SEEN (historical — possibly already resolved; use only for pattern / root-cause context, NOT as active problems)\n${h}\n`;
  }
  p+=`
WHAT I WANT BACK
A short, practical writeup per code: likely cause, severity, and owner-reported fixes — with source links. Favor DIY / independent-tech / community fixes over "see your dealer" (there are no dealers). Call out when several codes likely share one root cause.

WHERE TO LOOK
1. Fisker Owners Association forum — https://community.fiskeroa.com — the single best source. IMPORTANT: it requires a free login, so a normal web search can't see most of it (setup below).
2. Public web: r/FiskerOcean (Reddit), the "Fisker Owners" Facebook groups, oceanforums.com, and YouTube owner repair videos.

HOW TO GET INTO THE GATED FORUM (do this first)
• If you're Claude: ask me to connect the "Claude in Chrome" extension (or enable computer use); I'll open community.fiskeroa.com and log in, then you can search it.
• If you're ChatGPT or Gemini with browsing / agent mode: tell me how to turn it on, I'll log into the forum in the browser you can see, then search it.
• If you have no logged-in browser access: use the public sources above and give me ready-made forum search links to check myself.

Start by confirming how you'll access the forum, then go code by code.`;
  return p;
}

/* ---- clear DTCs ---- */
function clearCard(){
  const liveOk=connected&&!busy&&!viewingSaved&&!!view;
  const mods=((view&&view.modules)||[]).filter(m=>(m.counts.active+m.counts.historical)>0);
  const note=viewingSaved?`<div class="std" style="margin-top:8px">You're viewing a saved scan — switch to Live to clear codes.</div>`:(!connected?`<div class="std" style="margin-top:8px">Connect to the car to clear codes.</div>`:"");
  const list=mods.length?mods.map(m=>`<label class="clrow"><input type="checkbox" class="clchk" value="${esc(m.name)}" ${liveOk?"":"disabled"}><span class="cln">${esc(m.label)}</span><span class="clc">${m.counts.active?`<span class="pill red">${m.counts.active}a</span>`:""}${m.counts.historical?`<span class="pill amber">${m.counts.historical}h</span>`:""}</span></label>`).join(""):`<div class="td">No stored codes to clear.</div>`;
  return `<div class="tool" style="flex-direction:column;align-items:stretch"><div class="ti">Clear DTC codes</div><div class="td" style="margin-top:3px">Erases stored fault codes from the modules you pick (UDS service 0x14). Your current scan is already saved to disk, and the car is re-scanned afterward so you can see what truly cleared vs. came right back. Active faults re-set immediately — this fixes nothing, it just clears residual history. <b style="color:var(--text)">Erased on-car history can't be recovered.</b></div>${note}<div style="margin-top:10px">${list}</div>`+
    (mods.length?`<div class="toolbtns" style="margin-top:12px;align-items:center;gap:10px"><button class="btn ghost" ${liveOk?"":"disabled"} onclick="clearSelected()" data-tip="Erases codes from the checked modules — asks you to confirm first">Clear selected</button><button class="linkbtn" onclick="clrAll(true)">Select all</button><button class="linkbtn" onclick="clrAll(false)">None</button></div>`:"")+
    `</div>`;
}
function clrAll(on){ document.querySelectorAll(".clchk").forEach(c=>{ if(!c.disabled) c.checked=on; }); }
function clearSelected(){
  const checked=[...document.querySelectorAll(".clchk:checked")];
  if(!checked.length) return;
  const sel=checked.map(c=>c.value);
  const names=checked.map(c=>c.closest(".clrow").querySelector(".cln").textContent);
  confirmAction(`Clear stored codes from ${sel.length} module${sel.length>1?"s":""} — ${names.slice(0,3).join(", ")}${sel.length>3?", …":""}? The on-car history will be erased and can't be recovered (your saved scan keeps the record).`, ()=>sendMsg({command:"clear_dtcs", modules:sel}));
}
function onClearResult(m){
  const r=m.results||[], ok=r.filter(x=>x.ok).length;

  infoModal(`Cleared ${ok} of ${r.length} module${r.length===1?"":"s"}`, `${rows}<div style="margin-top:10px;color:var(--dim)">Counts are from a fresh re-scan just now. Anything still listed is currently <b style="color:var(--text)">active</b> — it re-sets the instant it's cleared and won't go away until the underlying fault is fixed.</div>`);
}

function log(msg){ logBuf.push(msg); if(logBuf.length>600) logBuf.shift(); if(cur==="log"){ const el=$("logRaw"); if(el){ el.textContent=logBuf.join("\n"); el.scrollTop=el.scrollHeight; } } }

/* ---- viewport-clamped tooltips (no edge clipping) ---- */
const tip=document.createElement("div"); tip.id="tip"; document.body.appendChild(tip);
let tipEl=null;
function placeTip(t){
  tip.textContent=t.getAttribute("data-tip");
  const r=t.getBoundingClientRect(), tw=tip.offsetWidth, th=tip.offsetHeight, M=8;
  let top=r.bottom+6; if(top+th>innerHeight-M) top=r.top-th-6; if(top<M) top=M;
  let left=Math.max(M, Math.min(r.left+r.width/2-tw/2, innerWidth-tw-M));
  tip.style.top=top+"px"; tip.style.left=left+"px"; tip.classList.add("show");
}
document.addEventListener("mouseover",e=>{
  const t=e.target.closest&&e.target.closest("[data-tip]");
  if(!t){ tipEl=null; tip.classList.remove("show"); return; }
  if(t===tipEl) return; tipEl=t; placeTip(t);
});
window.addEventListener("scroll",()=>{ tipEl=null; tip.classList.remove("show"); },true);

    <div class="cbtns"><button class="btn primary" id="discOk" disabled style="width:auto">Continue</button></div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector("#discAgree").onchange=function(){ ov.querySelector("#discOk").disabled=!this.checked; };
  ov.querySelector("#discOk").onclick=()=>{ try{ localStorage.setItem("fk_disclaimer","1"); }catch(e){} ov.remove(); accepted=true; maybeAutoScan(); };
})();
