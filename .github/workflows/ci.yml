name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile all modules
        run: python -m compileall -q fiskeretta
      - name: Import smoke test
        run: python -c "import fiskeretta.server; print('server imports OK')"
