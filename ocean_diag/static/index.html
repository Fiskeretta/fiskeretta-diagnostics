<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ocean Diag</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 760px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #111;
      color: #ddd;
    }
    h1 { font-size: 1.25rem; margin-bottom: 0.25rem; }
    p.sub { color: #888; margin-top: 0; }
    button {
      font-size: 1rem;
      padding: 0.6rem 1.2rem;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2a6;
      color: #fff;
      cursor: pointer;
    }
    button:disabled { background: #444; cursor: default; }
    #log {
      margin-top: 1rem;
      background: #000;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      height: 420px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .status { color: #888; font-size: 0.85rem; margin-left: 0.75rem; }
  </style>
</head>
<body>
  <h1>Ocean Diag</h1>
  <p class="sub">Free, open diagnostics for the Fisker Ocean via the Vgate vLinker FD+</p>

  <button id="run" data-command="scan_and_connect">Scan &amp; Connect</button>
  <button id="readVin" data-command="read_vin">Read VIN</button>
  <button id="readDtcs" data-command="read_dtcs">Read DTCs</button>
  <span id="status" class="status"></span>

  <div id="log"></div>

  <script>
    const logEl = document.getElementById("log");
    const buttons = [document.getElementById("run"), document.getElementById("readVin"), document.getElementById("readDtcs")];
    const statusEl = document.getElementById("status");

    function appendLog(message) {
      const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 4;
      logEl.textContent += message + "\n";
      if (atBottom) logEl.scrollTop = logEl.scrollHeight;
    }

    const ws = new WebSocket(`ws://${location.host}/ws`);

    ws.onopen = () => appendLog("Connected to ocean-diag server.");
    ws.onclose = () => {
      appendLog("Disconnected from server.");
      buttons.forEach((b) => (b.disabled = true));
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === "log") {
        appendLog(msg.message);
      } else if (msg.type === "status") {
        const running = msg.value === "running";
        buttons.forEach((b) => (b.disabled = running));
        statusEl.textContent = running ? "running…" : "";
      }
    };

    buttons.forEach((btn) => {
      btn.addEventListener("click", () => {
        logEl.textContent = "";
        ws.send(JSON.stringify({ command: btn.dataset.command }));
      });
    });
  </script>
</body>
</html>
