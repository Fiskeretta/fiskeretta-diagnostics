<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ocean Diag</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 760px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #111;
      color: #ddd;
    }
    h1 { font-size: 1.25rem; margin-bottom: 0.25rem; }
    p.sub { color: #888; margin-top: 0; }
    button {
      font-size: 1rem;
      padding: 0.6rem 1.2rem;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2a6;
      color: #fff;
      cursor: pointer;
    }
    button:disabled { background: #444; color: #999; cursor: default; }
    button.secondary { background: #333; }
    #connbar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.75rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      margin-bottom: 1rem;
    }
    #dot { width: 10px; height: 10px; border-radius: 50%; background: #b33; flex: none; }
    #dot.on { background: #2a6; }
    #dot.busy { background: #ca3; }
    #connText { flex: 1; font-size: 0.9rem; }
    #actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    #log {
      margin-top: 1rem;
      background: #000;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      height: 420px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.85rem;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Ocean Diag</h1>
  <p class="sub">Free, open diagnostics for the Fisker Ocean via the Vgate vLinker FD+</p>

  <div id="connbar">
    <span id="dot"></span>
    <span id="connText">Starting…</span>
    <button id="connectBtn" class="secondary">Connect</button>
    <button id="disconnectBtn" class="secondary">Disconnect</button>
  </div>

  <div id="actions">
    <button data-command="read_vin">Read VIN</button>
    <button data-command="read_dtcs">Read DTCs</button>
    <button data-command="drill_failing">Drill Into Failing</button>
  </div>

  <div id="log"></div>

  <script>
    const logEl = document.getElementById("log");
    const dot = document.getElementById("dot");
    const connText = document.getElementById("connText");
    const connectBtn = document.getElementById("connectBtn");
    const disconnectBtn = document.getElementById("disconnectBtn");
    const actionButtons = [...document.querySelectorAll("#actions button")];

    let connected = false;
    let busy = false;

    function appendLog(message) {
      const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 4;
      logEl.textContent += message + "\n";
      if (atBottom) logEl.scrollTop = logEl.scrollHeight;
    }

    function render() {
      dot.className = busy ? "busy" : (connected ? "on" : "");
      // action buttons need a live connection and no in-flight op
      actionButtons.forEach((b) => (b.disabled = !connected || busy));
      connectBtn.disabled = busy || connected;
      disconnectBtn.disabled = busy || !connected;
    }

    const ws = new WebSocket(`ws://${location.host}/ws`);

    ws.onopen = () => appendLog("Connected to ocean-diag server.");
    ws.onclose = () => {
      appendLog("Disconnected from server.");
      connected = false; busy = true; render();
      connText.textContent = "Server connection lost.";
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === "log") {
        appendLog(msg.message);
      } else if (msg.type === "status") {
        busy = msg.value === "running";
        render();
      } else if (msg.type === "connection") {
        connected = msg.connected;
        connText.textContent = connected
          ? `Connected — ${msg.device || "dongle"}`
          : "Not connected to the dongle.";
        render();
      }
    };

    connectBtn.addEventListener("click", () => ws.send(JSON.stringify({ command: "connect" })));
    disconnectBtn.addEventListener("click", () => ws.send(JSON.stringify({ command: "disconnect" })));
    actionButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        logEl.textContent = "";
        ws.send(JSON.stringify({ command: btn.dataset.command }));
      });
    });

    render();
  </script>
</body>
</html>
